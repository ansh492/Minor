<!-- templates/authentication/register.html -->
{% extends 'authentication/base.html' %} {% block title %}Register -
Authentication System{% endblock %} {% block content %}
<div class="auth-card">
    <h2>Create Account</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_email">Email</label>
            <input type="email" name="email" id="id_email" required />
        </div>
        <div class="form-group">
            <label for="id_name">Name</label>
            <input type="text" name="name" id="id_name" required />
        </div>
        <div class="form-group">
            <label for="id_main_file">Main File (Optional)</label>
            <input type="text" name="main_file" id="id_main_file" />
        </div>
        <div class="form-group">
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" required />
            <small style="color: #666; display: block; margin-top: 5px">
                Password must be at least 8 characters with uppercase letters
                and numbers
            </small>
        </div>
        <div class="form-group">
            <label for="id_confirm_password">Confirm Password</label>
            <input
                type="password"
                name="confirm_password"
                id="id_confirm_password"
                required
            />
        </div>
        <button type="submit">Register</button>
    </form>
    <p style="margin-top: 20px; text-align: center">
        Already have an account? <a href="{% url 'login' %}">Login here</a>
    </p>
</div>
{% endblock %}
