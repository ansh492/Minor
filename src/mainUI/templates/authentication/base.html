<!-- templates/authentication/base.html -->
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}Authentication System{% endblock %}</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                padding: 20px;
            }

            .container {
                max-width: 1200px;
                margin: 0 auto;
            }

            .auth-card {
                background: white;
                border-radius: 10px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
                padding: 40px;
                max-width: 500px;
                margin: 50px auto;
            }

            .form-group {
                margin-bottom: 20px;
            }

            label {
                display: block;
                margin-bottom: 5px;
                color: #333;
                font-weight: 500;
            }

            input,
            textarea {
                width: 100%;
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 5px;
                font-size: 16px;
            }

            button {
                background: #667eea;
                color: white;
                padding: 12px 30px;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                font-size: 16px;
                width: 100%;
            }

            button:hover {
                background: #5a67d8;
            }

            .messages {
                margin-bottom: 20px;
            }

            .alert {
                padding: 10px;
                border-radius: 5px;
                margin-bottom: 10px;
            }

            .alert-success {
                background: #d4edda;
                color: #155724;
                border: 1px solid #c3e6cb;
            }

            .alert-error,
            .alert-danger {
                background: #f8d7da;
                color: #721c24;
                border: 1px solid #f5c6cb;
            }

            .nav {
                background: white;
                padding: 15px;
                border-radius: 10px;
                margin-bottom: 20px;
            }

            .nav-links {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .nav-links a {
                color: #667eea;
                text-decoration: none;
                margin-left: 20px;
            }

            .nav-links a:hover {
                text-decoration: underline;
            }

            h2,
            h3,
            h4 {
                margin-bottom: 20px;
                color: #333;
            }

            .dashboard-card {
                background: white;
                border-radius: 10px;
                padding: 20px;
                margin-bottom: 20px;
            }

            pre {
                background: #f4f4f4;
                padding: 10px;
                border-radius: 5px;
                overflow-x: auto;
            }

            .btn-secondary {
                background: #6c757d;
                margin-top: 10px;
            }

            .btn-secondary:hover {
                background: #5a6268;
            }
        </style>
        {% block extra_css %}{% endblock %}
    </head>
    <body>
        <div class="container">
            {% if user.is_authenticated %}
            <div class="nav">
                <div class="nav-links">
                    <span>Welcome, {{ user.name }}!</span>
                    <div>
                        <a href="{% url 'dashboard' %}">Dashboard</a>
                        <a href="{% url 'logout' %}">Logout</a>
                    </div>
                </div>
            </div>
            {% endif %} {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div
                    class="alert alert-{% if message.tags %}{{ message.tags }}{% else %}info{% endif %}"
                >
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %} {% block content %}{% endblock %}
        </div>
    </body>
</html>
